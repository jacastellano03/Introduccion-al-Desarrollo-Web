<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro de Productos</title>
    <link rel="stylesheet" href="ejercicio4.css">

</head>

<body>

    <div class="contenedor">

        <h2>Registro de Productos</h2>

        <label for="Nombre">Nombre: </label>

        <input type="text" placeholder="Ingrese el nombre del Producto: " id="Nombre"><br><br>
        <select name="" id="categoria">

            <option value="ropa">Ropa</option>
            <option value="tecnologia">Tecnologia</option>
            <option value="cocina">Cocina</option>
            <option value="pet shop">Pet Shop</option>
            <option value="alimentos">Alimentos</option>

        </select>

        <label for="precio">Precio: </label>
        <input type="number" id="precio" placeholder="Ingrese el precio del producto">

        <label for="URL">URL: </label>
        <input type="text" id="img" placeholder="URL de la Imagen">


        <button onclick="registrarProducto()">Registrar Producto</button>

    </div>

    <script src="script4.js"></script>
    
</body>

</html>
